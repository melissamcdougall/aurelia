<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aurelia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0c;
      --fg: #e8e8e8;
      --dim: #444;
      --muted: #777;
      --accent: #e04020;
      --panel-bg: rgba(255, 255, 255, 0.03);
      --panel-border: rgba(255, 255, 255, 0.08);
      --ghost: rgba(255, 255, 255, 0.02);
      --focus-bg: rgba(224, 64, 32, 0.1);
      --healthy: #2ecc71;
      --unhealthy: #e04020;
      --unknown: #777;
      --stopped: #444;
    }

    [data-theme="light"] {
      --bg: #f0ebe4;
      --fg: #1a1410;
      --dim: #a08a78;
      --muted: #5c4d42;
      --accent: #c04020;
      --panel-bg: rgba(192, 72, 32, 0.04);
      --panel-border: rgba(160, 138, 120, 0.3);
      --ghost: rgba(192, 72, 32, 0.04);
      --focus-bg: rgba(192, 64, 32, 0.12);
      --healthy: #27ae60;
      --unhealthy: #c04020;
      --unknown: #a08a78;
      --stopped: #a08a78;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f0ebe4; --fg: #1a1410; --dim: #a08a78; --muted: #5c4d42;
        --accent: #c04020; --panel-bg: rgba(192, 72, 32, 0.04);
        --panel-border: rgba(160, 138, 120, 0.3); --ghost: rgba(192, 72, 32, 0.04);
        --focus-bg: rgba(192, 64, 32, 0.12);
        --healthy: #27ae60; --unhealthy: #c04020; --unknown: #a08a78; --stopped: #a08a78;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .header-status {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-status .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    .header-status .dot.ok { background: var(--healthy); }
    .header-status .dot.err { background: var(--unhealthy); }

    .graph-container {
      flex: 1;
      overflow: auto;
      padding: 2rem;
    }

    #graph svg { display: block; }

    /* --- Detail panel --- */

    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) .detail-overlay { background: rgba(240, 235, 228, 0.92); }
    }
    [data-theme="light"] .detail-overlay { background: rgba(240, 235, 228, 0.92); }

    .detail-overlay.active { opacity: 1; pointer-events: all; }

    .detail-panel {
      width: 90vw; max-width: 40rem; max-height: 85vh;
      overflow-y: auto; background: var(--bg);
      border: 1px solid var(--panel-border);
      transform: scale(0.92);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .detail-overlay.active .detail-panel { transform: scale(1); }

    .detail-close {
      position: absolute; top: 1rem; right: 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); background: var(--bg);
      border: 1px solid var(--dim); padding: 0.4rem 0.8rem;
      cursor: pointer; transition: all 0.2s; z-index: 101;
    }
    .detail-close:hover { color: var(--fg); border-color: var(--fg); }

    .detail-header { padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--panel-border); }
    .detail-name { font-family: 'Archivo Black', sans-serif; font-size: 1.8rem; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1; }
    .detail-meta { display: flex; gap: 1.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .detail-meta-item { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .detail-meta-label { color: var(--dim); margin-right: 0.3rem; }
    .detail-section { padding: 1rem 1.5rem; border-bottom: 1px solid var(--panel-border); }
    .detail-section:last-child { border-bottom: none; }
    .detail-section-title { font-size: 0.5rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim); margin-bottom: 0.75rem; }
    .detail-deps-list { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .detail-dep-tag { font-size: 0.6rem; letter-spacing: 0.08em; padding: 0.35rem 0.6rem; border: 1px solid var(--dim); color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .detail-dep-tag:hover { border-color: var(--accent); color: var(--accent); }
    .detail-dep-tag.hard { border-color: var(--fg); color: var(--fg); }
    .detail-logs { font-size: 0.6rem; line-height: 1.6; color: var(--muted); white-space: pre-wrap; word-break: break-all; max-height: 12rem; overflow-y: auto; background: var(--ghost); padding: 0.75rem; border: 1px solid var(--panel-border); }
    .detail-health-list { display: flex; flex-direction: column; gap: 0.25rem; }
    .detail-health-entry { font-size: 0.55rem; display: flex; gap: 0.75rem; padding: 0.25rem 0; border-bottom: 1px solid var(--panel-border); }
    .detail-health-entry:last-child { border-bottom: none; }
    .detail-health-time { color: var(--dim); min-width: 5rem; }
    .detail-health-status { min-width: 4rem; }
    .detail-health-latency { color: var(--dim); }

    .legend {
      padding: 0.75rem 2rem;
      border-top: 1px solid var(--panel-border);
      display: flex; gap: 1.5rem; justify-content: center; align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.5rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-line { width: 20px; height: 0; border-top: 1px solid; }
    .legend-line.dashed { border-top-style: dashed; }

    .theme-toggle {
      position: fixed; bottom: 0.75rem; left: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); background: var(--bg);
      border: 1px solid var(--dim); padding: 0.4rem 0.8rem;
      cursor: pointer; transition: all 0.2s; z-index: 10;
    }
    .theme-toggle:hover { color: var(--fg); border-color: var(--fg); }

    .node-group { cursor: pointer; }
    .node-group:hover rect.node-bg { stroke: var(--accent) !important; }
    .node-group:hover .node-name { fill: var(--accent) !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">Aurelia</div>
    <div class="header-status" id="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">connecting</span>
    </div>
  </div>

  <div class="graph-container">
    <div id="graph"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background: var(--healthy)"></div> healthy</div>
    <div class="legend-item"><div class="legend-dot" style="background: var(--unhealthy)"></div> unhealthy</div>
    <div class="legend-item"><div class="legend-dot" style="background: var(--unknown)"></div> unknown</div>
    <div class="legend-item"><div class="legend-dot" style="background: var(--stopped)"></div> stopped</div>
    <div class="legend-item"><div class="legend-line" style="border-color: var(--fg)"></div> requires</div>
    <div class="legend-item"><div class="legend-line dashed" style="border-color: var(--dim)"></div> after</div>
  </div>

  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel" id="detailPanel">
      <button class="detail-close" id="detailClose">close</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <button class="theme-toggle" id="themeToggle">light</button>

  <script>
    // Theme
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;

    function getEffectiveTheme() {
      const stored = localStorage.getItem('aurelia-theme');
      if (stored) return stored;
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      toggle.textContent = theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('aurelia-theme', theme);
    }

    applyTheme(getEffectiveTheme());
    toggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme') || 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    // State
    let graphData = [];
    let selectedNode = null;

    const graphEl = document.getElementById('graph');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const detailOverlay = document.getElementById('detailOverlay');
    const detailContent = document.getElementById('detailContent');
    const detailClose = document.getElementById('detailClose');

    function healthColor(state, health) {
      if (state === 'stopped' || state === 'failed') return 'var(--stopped)';
      if (health === 'healthy') return 'var(--healthy)';
      if (health === 'unhealthy') return 'var(--unhealthy)';
      return 'var(--unknown)';
    }

    function stateLabel(state, health) {
      if (state === 'failed') return 'failed';
      if (state === 'stopped') return 'stopped';
      if (state === 'starting') return 'starting';
      if (state === 'stopping') return 'stopping';
      return health || 'unknown';
    }

    function typeIcon(type) {
      if (type === 'container') return '\u25A1';
      if (type === 'external') return '\u25C7';
      return '\u25CB';
    }

    // --- Layout: hand-placed grid per host ---

    function renderGraph(nodes) {
      // Group by host
      const hosts = {};
      nodes.forEach(n => {
        const host = n.node || 'local';
        if (!hosts[host]) hosts[host] = [];
        hosts[host].push(n);
      });

      // Sort services within each host: infrastructure first (things others depend on),
      // then alphabetical
      const hostNames = Object.keys(hosts).sort();
      hostNames.forEach(host => {
        const svcs = hosts[host];
        // Count how many services on this host depend on each service
        const depCount = {};
        svcs.forEach(s => { depCount[s.name] = 0; });
        svcs.forEach(s => {
          [...(s.requires || []), ...(s.after || [])].forEach(dep => {
            if (depCount[dep] !== undefined) depCount[dep]++;
          });
        });
        // Sort: most depended-on first, then alphabetical
        svcs.sort((a, b) => (depCount[b.name] || 0) - (depCount[a.name] || 0) || a.name.localeCompare(b.name));
        hosts[host] = svcs;
      });

      // Layout constants
      const nodeW = 150;
      const nodeH = 28;
      const gapX = 8;
      const gapY = 6;
      const cols = 4;
      const hostPadX = 24;
      const hostPadTop = 28;
      const hostPadBottom = 16;
      const hostGap = 40;

      // Compute positions: each host gets a block, stacked vertically
      const positions = {}; // key -> {x, y, cx, cy}
      let currentY = 20;

      const hostBlocks = {}; // host -> {x, y, w, h}

      hostNames.forEach(host => {
        const svcs = hosts[host];
        const rows = Math.ceil(svcs.length / cols);
        const blockW = hostPadX * 2 + cols * nodeW + (cols - 1) * gapX;
        const blockH = hostPadTop + rows * nodeH + (rows - 1) * gapY + hostPadBottom;

        hostBlocks[host] = { x: 20, y: currentY, w: blockW, h: blockH };

        svcs.forEach((svc, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const x = 20 + hostPadX + col * (nodeW + gapX);
          const y = currentY + hostPadTop + row * (nodeH + gapY);
          const key = host + '/' + svc.name;
          positions[key] = { x, y, cx: x + nodeW / 2, cy: y + nodeH / 2, svc };
        });

        currentY += blockH + hostGap;
      });

      const totalW = 20 + hostPadX * 2 + cols * nodeW + (cols - 1) * gapX + 40;
      const totalH = currentY;

      let svg = `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;

      // Arrow markers
      svg += `<defs>
        <marker id="arrowSolid" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
          <path d="M0,0 L6,2 L0,4" fill="none" stroke="var(--fg)" stroke-width="1"/>
        </marker>
        <marker id="arrowDash" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
          <path d="M0,0 L6,2 L0,4" fill="none" stroke="var(--dim)" stroke-width="1"/>
        </marker>
      </defs>`;

      // Dependency edges (drawn first, behind nodes)
      nodes.forEach(n => {
        const host = n.node || 'local';
        const srcKey = host + '/' + n.name;
        const src = positions[srcKey];
        if (!src) return;

        const drawEdge = (dep, type) => {
          // Find dep on same host first, then any host
          let tgtKey = host + '/' + dep;
          if (!positions[tgtKey]) {
            // Search other hosts
            for (const h of hostNames) {
              const k = h + '/' + dep;
              if (positions[k]) { tgtKey = k; break; }
            }
          }
          const tgt = positions[tgtKey];
          if (!tgt) return;

          const isRequires = type === 'requires';
          const stroke = isRequires ? 'var(--fg)' : 'var(--dim)';
          const dash = isRequires ? '' : ' stroke-dasharray="3,2"';
          const marker = isRequires ? 'url(#arrowSolid)' : 'url(#arrowDash)';

          // Draw from target (dependency) right edge to source left edge
          const x1 = tgt.x + nodeW;
          const y1 = tgt.cy;
          const x2 = src.x;
          const y2 = src.cy;

          // If same row, curve right. Otherwise, use a simple path.
          const midX = Math.max(x1, x2) + 20;
          svg += `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}" fill="none" stroke="${stroke}" stroke-width="1"${dash} marker-end="${marker}" opacity="0.5"/>`;
        };

        (n.requires || []).forEach(dep => drawEdge(dep, 'requires'));
        (n.after || []).forEach(dep => {
          if (!(n.requires || []).includes(dep)) drawEdge(dep, 'after');
        });
      });

      // Host blocks
      hostNames.forEach(host => {
        const b = hostBlocks[host];
        svg += `<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" fill="none" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3,3" rx="2"/>`;
        svg += `<text x="${b.x + 10}" y="${b.y + 16}" fill="var(--dim)" font-size="8" font-family="'Space Mono', monospace" letter-spacing="0.2em">${host.toUpperCase()}</text>`;
      });

      // Service nodes
      Object.entries(positions).forEach(([key, pos]) => {
        const svc = pos.svc;
        const x = pos.x;
        const y = pos.y;
        const color = healthColor(svc.state, svc.health);
        const label = stateLabel(svc.state, svc.health);
        const host = svc.node || 'local';

        svg += `<g class="node-group" onclick="showDetail('${host}/${svc.name}')">`;
        svg += `<rect class="node-bg" x="${x}" y="${y}" width="${nodeW}" height="${nodeH}" fill="var(--bg)" stroke="var(--panel-border)" stroke-width="1"/>`;

        // Health dot
        svg += `<circle cx="${x + 10}" cy="${y + nodeH / 2}" r="3" fill="${color}"/>`;

        // Name
        svg += `<text class="node-name" x="${x + 18}" y="${y + 12}" fill="var(--fg)" font-size="9" font-family="'Space Mono', monospace" letter-spacing="0.04em">${svc.name}</text>`;

        // Type + state on second line
        svg += `<text x="${x + 18}" y="${y + 22}" fill="var(--muted)" font-size="7" font-family="'Space Mono', monospace" letter-spacing="0.02em">${typeIcon(svc.type)} ${label}${svc.port ? ' :' + svc.port : ''}</text>`;

        svg += `</g>`;
      });

      svg += `</svg>`;
      graphEl.innerHTML = svg;
    }

    // Detail panel
    function showDetail(key) {
      selectedNode = key;
      const [nodeId, svcName] = key.split('/');
      const svc = graphData.find(n => (n.node || 'local') === nodeId && n.name === svcName);
      if (!svc) return;

      const color = healthColor(svc.state, svc.health);
      const label = stateLabel(svc.state, svc.health);

      let html = `
        <div class="detail-header">
          <div class="detail-name">${svc.name}</div>
          <div class="detail-meta">
            <div class="detail-meta-item"><span class="detail-meta-label">node</span> ${svc.node || 'local'}</div>
            <div class="detail-meta-item"><span class="detail-meta-label">type</span> ${svc.type}</div>
            <div class="detail-meta-item"><span class="detail-meta-label">state</span> ${svc.state}</div>
            <div class="detail-meta-item"><span class="detail-meta-label">health</span> <span style="color: ${color}">${label}</span></div>
            ${svc.port ? `<div class="detail-meta-item"><span class="detail-meta-label">port</span> ${svc.port}</div>` : ''}
            ${svc.uptime ? `<div class="detail-meta-item"><span class="detail-meta-label">uptime</span> ${svc.uptime}</div>` : ''}
            ${svc.restart_count ? `<div class="detail-meta-item"><span class="detail-meta-label">restarts</span> ${svc.restart_count}</div>` : ''}
          </div>
        </div>
      `;

      const allDeps = [...new Set([...(svc.requires || []), ...(svc.after || [])])];
      const requires = new Set(svc.requires || []);
      if (allDeps.length > 0) {
        html += `<div class="detail-section">
          <div class="detail-section-title">Dependencies</div>
          <div class="detail-deps-list">
            ${allDeps.map(d => `<div class="detail-dep-tag ${requires.has(d) ? 'hard' : ''}" onclick="showDetail('${nodeId}/${d}')">${d}${requires.has(d) ? ' (hard)' : ''}</div>`).join('')}
          </div>
        </div>`;
      }

      const dependents = graphData.filter(n =>
        (n.node || 'local') === nodeId &&
        ((n.requires || []).includes(svcName) || (n.after || []).includes(svcName))
      );
      if (dependents.length > 0) {
        html += `<div class="detail-section">
          <div class="detail-section-title">Depended on by</div>
          <div class="detail-deps-list">
            ${dependents.map(d => `<div class="detail-dep-tag" onclick="showDetail('${d.node || 'local'}/${d.name}')">${d.name}</div>`).join('')}
          </div>
        </div>`;
      }

      detailContent.innerHTML = html;
      detailOverlay.classList.add('active');

      Promise.all([
        fetch(`/v1/services/${svcName}/health`).then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(`/v1/services/${svcName}/logs?n=30`).then(r => r.ok ? r.json() : null).catch(() => null),
      ]).then(([healthData, logsData]) => {
        let extra = '';

        if (healthData && healthData.history && healthData.history.length > 0) {
          extra += `<div class="detail-section">
            <div class="detail-section-title">Health History</div>
            <div class="detail-health-list">
              ${healthData.history.slice(-10).reverse().map(h => `
                <div class="detail-health-entry">
                  <span class="detail-health-time">${new Date(h.timestamp).toLocaleTimeString()}</span>
                  <span class="detail-health-status" style="color: ${h.status === 'healthy' ? 'var(--healthy)' : h.status === 'unhealthy' ? 'var(--unhealthy)' : 'var(--unknown)'}">${h.status}</span>
                  ${h.latency ? `<span class="detail-health-latency">${h.latency}</span>` : ''}
                </div>
              `).join('')}
            </div>
          </div>`;
        }

        if (logsData && logsData.length > 0) {
          const escaped = logsData.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          extra += `<div class="detail-section">
            <div class="detail-section-title">Logs (last ${logsData.length})</div>
            <div class="detail-logs">${escaped}</div>
          </div>`;
        }

        if (extra) detailContent.innerHTML += extra;
      });
    }

    function closeDetail() {
      detailOverlay.classList.remove('active');
      selectedNode = null;
    }

    detailClose.addEventListener('click', closeDetail);
    detailOverlay.addEventListener('click', e => { if (e.target === detailOverlay) closeDetail(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // Polling
    let consecutiveErrors = 0;

    async function fetchGraph() {
      try {
        const resp = await fetch('/v1/cluster/graph');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const data = await resp.json();
        graphData = data.nodes || [];
        const peers = data.peers || {};
        consecutiveErrors = 0;

        const peerSummary = Object.entries(peers)
          .map(([name, status]) => `${name}: ${status}`)
          .join(', ');

        statusDot.className = 'dot ok';
        statusText.textContent = `${graphData.length} services` + (peerSummary ? ` \u00B7 ${peerSummary}` : '');

        renderGraph(graphData);
      } catch (err) {
        consecutiveErrors++;
        statusDot.className = 'dot err';
        statusText.textContent = 'disconnected';

        if (consecutiveErrors > 3) {
          graphEl.innerHTML = `<div style="text-align: center; color: var(--muted); font-size: 0.7rem; letter-spacing: 0.1em;">DISCONNECTED FROM DAEMON</div>`;
        }
      }
    }

    fetchGraph();
    setInterval(fetchGraph, 3000);
  </script>
</body>
</html>
